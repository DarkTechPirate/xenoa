name: xenooo

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ops
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            cd /home/ops/xenoa/

            echo "Pulling code..."
            git pull --autostash
           

            echo "Building containers..."
            docker compose down
            docker compose build --no-cache
            docker compose up -d

            docker image prune -f 


            
